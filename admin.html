<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Admin</title><link rel="stylesheet" href="styles.css"/><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js"></script></head><body><header class="app-header"><div><h1>Admin Panel</h1><p class="subtitle">Create private flashcards and recordings</p></div><nav class="top-nav"><a href="index.html" class="nav-btn">Home</a><button id="logoutBtn" class="nav-btn hidden" type="button">Logout</button></nav></header><main class="admin-container"><section id="authPanel" class="admin-card"><h2>Log in / Register</h2><label>Email</label><input type="email" id="emailInput"/><label>Password</label><input type="password" id="passwordInput"/><button id="loginBtn">Log in</button><button id="registerBtn">Register</button><p id="authMessage"></p></section><section id="adminTools" class="hidden"><section class="admin-card"><h2>Add Private Category</h2><input id="categoryName"/><button id="addCategoryBtn">Add Category</button></section><section class="admin-card"><h2>Add Flashcard</h2><select id="cardCategory"></select><input id="cardWordInput"/><input type="file" id="cardPhoto" accept="image/*"/><button id="startRecordBtn">Start Recording</button><button id="stopRecordBtn" disabled>Stop Recording</button><button id="previewRecordBtn" disabled>Preview Recording</button><button id="clearRecordBtn" disabled>Clear Recording</button><p id="recordStatus"></p><button id="previewVoiceBtn">Preview Computer Voice</button><button id="addCardBtn">Save Flashcard</button><p id="adminMessage"></p></section></section></main><script src="admin.js"></script></body></html>
